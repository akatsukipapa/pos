<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>美容室POS v1.40</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ecc813", "secondary": "#f472b6", "background-dark": "#0f0a15", "neutral-dark": "#1e1629" } } }
        }
    </script>
    <style type="text/tailwindcss">
        .gold-gradient { background: linear-gradient(135deg, #ecc813 0%, #b3970f 100%); }
        .premium-border { border: 1px solid rgba(236, 200, 19, 0.3); }
        .menu-item-active { @apply bg-secondary border-secondary text-background-dark font-bold; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">

<div id="app">
    <div id="main-screen">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center justify-between">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-2xl">fluid</span>
                    <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase" id="display-salon-name">Luxe Salon</h1>
                </div>
                <span class="text-[8px] text-slate-500 font-bold ml-8">v1.40 Stable</span>
            </div>
            <div class="flex gap-2">
                <button onclick="openHistoryWithAuth()" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30 active:scale-90 transition-all"><span class="material-symbols-outlined text-secondary">menu_book</span></button>
                <button onclick="switchScreen('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border active:scale-90 transition-all"><span class="material-symbols-outlined text-primary">settings</span></button>
            </div>
        </header>

        <main class="p-4 space-y-8 max-w-md mx-auto pb-80">
            <div id="menu-container" class="space-y-8"></div>
            <section class="space-y-4 pt-4 border-t border-white/10">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase px-2">手入力項目</h3>
                <div class="bg-neutral-dark p-6 rounded-2xl premium-border space-y-4">
                    <input id="custom-name" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none text-white placeholder:text-slate-600" placeholder="項目名" type="text"/>
                    <input id="custom-price" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none text-white placeholder:text-slate-600" placeholder="金額" type="number"/>
                    <button onclick="addCustomItem()" class="w-full py-3 bg-secondary/10 text-secondary border border-secondary/30 rounded-lg font-bold active:scale-95 transition-all">追加</button>
                </div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 bg-neutral-dark/95 backdrop-blur-xl border-t border-primary/30 p-4 pb-8">
            <div class="max-w-md mx-auto space-y-4">
                <div id="selected-list-area" class="hidden">
                    <div class="flex items-center justify-between mb-2 px-1"><span class="text-[10px] font-bold text-secondary uppercase tracking-widest">選択内容</span><button onclick="resetSelection()" class="text-[10px] text-slate-400 border-b border-slate-600">リセット</button></div>
                    <div id="selected-tags-container" class="flex flex-wrap gap-2 max-h-20 overflow-y-auto"></div>
                </div>
                <div class="flex items-end justify-between px-2 pt-2 border-t border-white/5">
                    <div class="flex flex-col"><span id="item-count" class="text-secondary text-[10px] font-bold uppercase tracking-widest">0点</span><span class="text-slate-200 text-sm font-bold">合計金額</span></div>
                    <div class="text-right"><span id="total-display" class="text-4xl font-black text-white tracking-tighter">¥ 0</span></div>
                </div>
                <button id="send-btn" onclick="sendSalesData()" class="w-full py-5 gold-gradient rounded-2xl text-background-dark font-black text-lg active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100">売上を送信する</button>
            </div>
        </footer>
    </div>

    <div id="settings-screen" class="hidden min-h-screen bg-background-dark pb-20">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-primary uppercase tracking-tight">店舗設定</h1>
        </header>
        <main class="p-4 space-y-6 max-w-md mx-auto">
            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-4 shadow-xl">
                <div><label class="text-[10px] font-bold text-primary uppercase">サロン名</label><input id="salon-name-input" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-2 mt-1 text-white" type="text"/></div>
                <div><label class="text-[10px] font-bold text-primary uppercase">GAS URL</label><input id="gas-url-input" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-2 mt-1 text-xs text-white" type="text"/></div>
                <button onclick="saveAllSettings()" class="w-full py-3 gold-gradient text-background-dark font-black rounded-xl active:scale-95">設定を保存して適用</button>
            </div>
            <div id="settings-menu-editor" class="space-y-6"></div>
            <button onclick="addNewCategory()" class="w-full py-4 border-2 border-dashed border-primary/30 rounded-xl text-primary font-bold active:scale-95">+ 新しいカテゴリー</button>
        </main>
    </div>

    <div id="history-screen" class="hidden min-h-screen bg-background-dark pb-10">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-secondary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-secondary uppercase">売上帳簿</h1>
        </header>
        <main id="history-content" class="p-4 max-w-md mx-auto space-y-4"></main>
    </div>
</div>

<script>
    let state = {
        salonName: "Luxe Salon", gasUrl: "", selectedItems: [],
        categories: [{ id: "c1", title: "カット", items: [{ id: "i1", name: "ドライカット", price: 1800 }] }]
    };

    function init() {
        const saved = localStorage.getItem('salon_pos_v140');
        if (saved) state = { ...state, ...JSON.parse(saved), selectedItems: [] };
        renderMain();
    }

    function switchScreen(screen) {
        ['main-screen', 'settings-screen', 'history-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screen + '-screen').classList.remove('hidden');
        window.scrollTo(0,0);
        if (screen === 'main') renderMain();
        if (screen === 'settings') renderSettings();
    }

    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        container.innerHTML = state.categories.map(cat => `
            <div class="space-y-4">
                <div class="px-2 border-l-4 border-secondary ml-1"><h2 class="text-lg font-bold">${cat.title}</h2></div>
                <div class="grid gap-3">
                    ${cat.items.map(item => `
                        <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" class="flex justify-between p-4 rounded-xl border transition-all ${state.selectedItems.some(si => si.id === item.id) ? 'menu-item-active' : 'bg-neutral-dark premium-border'}">
                            <span>${item.name}</span><span class="font-bold">¥${item.price.toLocaleString()}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        `).join('');
        updateSummary();
    }

    function renderSettings() {
        document.getElementById('salon-name-input').value = state.salonName;
        document.getElementById('gas-url-input').value = state.gasUrl;
        const editor = document.getElementById('settings-menu-editor');
        editor.innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4 relative shadow-lg">
                <button onclick="deleteCategory(${cIdx})" class="absolute top-4 right-4 text-red-500 font-bold text-[10px] uppercase">消去</button>
                <div class="grid gap-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase">カテゴリー名</label>
                    <input oninput="state.categories[${cIdx}].title = this.value" class="bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-white font-bold" value="${cat.title}" />
                </div>
                <div class="space-y-3 pt-2">
                    ${cat.items.map((item, iIdx) => `
                        <div class="flex gap-2">
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'name', this.value)" class="flex-1 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" value="${item.name}" />
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'price', this.value)" class="w-20 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" type="number" value="${item.price}" />
                        </div>
                    `).join('')}
                    <button onclick="addItem(${cIdx})" class="w-full py-2 bg-white/5 rounded text-[10px] text-slate-400">+ 項目追加</button>
                </div>
            </div>
        `).join('');
    }

    function toggleItem(id, name, price) {
        const idx = state.selectedItems.findIndex(i => i.id === id);
        if (idx > -1) state.selectedItems.splice(idx, 1);
        else state.selectedItems.push({ id, name, price });
        renderMain();
    }

    function updateSummary() {
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `${state.selectedItems.length}点`;
        const area = document.getElementById('selected-list-area');
        const container = document.getElementById('selected-tags-container');
        if (state.selectedItems.length > 0) {
            area.classList.remove('hidden');
            container.innerHTML = state.selectedItems.map(item => `<span class="px-2 py-1 bg-secondary/10 border border-secondary/30 text-secondary text-[10px] rounded-full font-bold">・${item.name}</span>`).join('');
        } else { area.classList.add('hidden'); }
    }

    function resetSelection() { state.selectedItems = []; renderMain(); }
    function updateItem(cIdx, iIdx, key, val) { state.categories[cIdx].items[iIdx][key] = key === 'price' ? parseInt(val) || 0 : val; }
    function addItem(cIdx) { state.categories[cIdx].items.push({ id: "i"+Date.now(), name: "新メニュー", price: 0 }); renderSettings(); }
    function addNewCategory() { state.categories.push({ id: "c"+Date.now(), title: "新カテゴリー", items: [] }); renderSettings(); }
    function deleteCategory(idx) { if(confirm('消去しますか？')){ state.categories.splice(idx, 1); renderSettings(); } }
    
    function saveAllSettings() {
        state.salonName = document.getElementById('salon-name-input').value;
        state.gasUrl = document.getElementById('gas-url-input').value;
        localStorage.setItem('salon_pos_v140', JSON.stringify(state));
        alert("設定を保存しました");
        switchScreen('main');
    }

    function addCustomItem() {
        const n = document.getElementById('custom-name').value;
        const p = parseInt(document.getElementById('custom-price').value);
        if (!n || isNaN(p)) return;
        state.selectedItems.push({ id: "cus"+Date.now(), name: n, price: p });
        document.getElementById('custom-name').value = '';
        document.getElementById('custom-price').value = '';
        renderMain();
    }

    async function sendSalesData() {
        const btn = document.getElementById('send-btn');
        if (!state.selectedItems.length || !state.gasUrl) return alert("URL未設定/項目未選択");
        
        btn.disabled = true;
        btn.textContent = "送信中...";
        
        const payload = { timestamp: new Date().toLocaleString('ja-JP'), items: state.selectedItems.map(i => i.name).join(','), total: state.selectedItems.reduce((s,i)=>s+i.price,0) };
        try { 
            await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); 
            alert("売上を送信しました"); 
            resetSelection(); 
        } catch(e) { 
            alert("送信エラー"); 
        } finally {
            btn.disabled = false;
            btn.textContent = "売上を送信する";
        }
    }

    async function openHistoryWithAuth() {
        if (!state.gasUrl) return alert("URLを設定してください");
        const pass = prompt("パスワードを入力");
        if (!pass) return;
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass }) });
            const data = await res.json();
            if (data.error) return alert(data.error);
            renderHistoryAccordion(data.summary, pass);
            switchScreen('history');
        } catch (e) { alert("通信エラー"); }
    }

    function renderHistoryAccordion(summary, pass) {
        const container = document.getElementById('history-content');
        const years = {};
        Object.keys(summary).forEach(m => {
            const y = m.split('年')[0];
            if (!years[y]) years[y] = { months: [], total: 0 };
            years[y].months.push({ month: m, total: summary[m] });
            years[y].total += summary[m];
        });

        const sortedYears = Object.keys(years).sort().reverse();
        container.innerHTML = sortedYears.map(y => `
            <div class="space-y-2">
                <button onclick="toggleYear('${y}')" class="w-full flex justify-between p-5 bg-neutral-dark rounded-xl border border-primary/20 shadow-lg active:scale-95 transition-all">
                    <span class="font-black text-primary text-lg tracking-widest">${y}年</span>
                    <span class="font-bold text-white uppercase text-xs self-center">Total ¥${years[y].total.toLocaleString()}</span>
                </button>
                <div id="year-content-${y}" class="hidden space-y-2 px-2 pb-4">
                    ${years[y].months.sort().reverse().map(m => `
                        <div onclick="fetchMonthDetails('${m.month}', '${pass}')" class="flex justify-between p-4 bg-white/5 border border-white/5 rounded-lg active:bg-white/10 transition-all">
                            <span class="text-sm font-bold text-slate-300">${m.month}</span>
                            <span class="font-bold text-secondary">¥${m.total.toLocaleString()}</span>
                        </div>
                    `).join('')}
                    <div id="details-${y}" class="mt-4 pt-4 border-t border-white/10 space-y-2 hidden"></div>
                </div>
            </div>
        `).join('');
    }

    function toggleYear(y) {
        const el = document.getElementById(`year-content-${y}`);
        el.classList.toggle('hidden');
    }

    async function fetchMonthDetails(month, pass) {
        const y = month.split('年')[0];
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass, month: month }) });
            const data = await res.json();
            const detailEl = document.getElementById(`details-${y}`);
            detailEl.innerHTML = `<h4 class="text-[10px] font-bold text-secondary uppercase mb-2 px-1">${month} 詳細</h4>` + 
                data.details.map(d => `<div class="flex justify-between p-3 bg-background-dark border border-white/5 rounded-lg text-[10px]"><span class="text-slate-400">${d.date}</span><span class="font-bold text-white">¥${d.price.toLocaleString()}</span></div>`).join('');
            detailEl.classList.remove('hidden');
            detailEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } catch (e) { alert("詳細取得エラー"); }
    }

    window.onbeforeunload = function() {
        if (state.selectedItems.length > 0) return "入力中のデータがありますが、終了しますか？";
    };

    init();
</script>
</body>
</html>
