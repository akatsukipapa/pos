<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>美容室POS１</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
    // --- データモデル（Stitchの初期構成を復元） ---
    let state = {
        salonName: "Luxe Salon POS",
        gasUrl: "",
        categories: [
            { id: "cat1", title: "カット", subtitle: "CUT", items: [
                { id: "i1", name: "ドライカット", price: 1800 },
                { id: "i2", name: "カット", price: 2700 },
                { id: "i3", name: "前髪カット", price: 500 }
            ]},
            { id: "cat2", title: "パーマ", subtitle: "PERM", items: [
                { id: "i4", name: "部分パーマ", price: 3500 },
                { id: "i5", name: "パーマ", price: 5500 },
                { id: "i6", name: "デジタルパーマ", price: 9500 }
            ]},
            { id: "cat3", title: "カラー", subtitle: "COLOR", items: [
                { id: "i7", name: "カラー", price: 4500 },
                { id: "i8", name: "メテオカラー", price: 8800 }
            ]}
        ],
        selectedItems: []
    };

    // --- 初期化 ---
    function init() {
        const saved = localStorage.getItem('salon_pos_state_v2');
        if (saved) {
            const parsed = JSON.parse(saved);
            // 保存データがある場合も、構造を維持して読み込む
            state = { ...state, ...parsed, selectedItems: [] }; 
        }
        updateGasStatus();
        renderAll();
    }

    // --- 画面切り替え ---
    function switchScreen(screen) {
        if (screen === 'main') {
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('settings-screen').classList.add('hidden');
            renderMain();
        } else {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('settings-screen').classList.remove('hidden');
            renderSettings();
        }
    }

    // --- メイン画面の描画（即時反映対応） ---
    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        container.innerHTML = state.categories.map(cat => `
            <section class="space-y-4">
                <div class="flex items-center gap-2 px-2">
                    <div class="h-4 w-1 bg-secondary rounded-full"></div>
                    <h2 class="text-lg font-bold tracking-tight">${cat.title} <span class="text-[10px] font-normal text-slate-500 uppercase ml-1">${cat.subtitle || ''}</span></h2>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    ${cat.items.map(item => {
                        const active = state.selectedItems.some(si => si.id === item.id);
                        const isSpecial = item.price >= 8000;
                        let btnClass = 'flex items-center justify-between p-4 rounded-xl transition-all border w-full ';
                        if (active) { btnClass += 'menu-item-active'; }
                        else if (isSpecial) { btnClass += 'bg-neutral-dark border-primary/50 text-primary'; }
                        else { btnClass += 'bg-neutral-dark premium-border'; }

                        return `
                            <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" class="${btnClass}">
                                <div class="flex items-center gap-3">
                                    <span class="material-symbols-outlined">${active ? 'check_circle' : (isSpecial ? 'stars' : 'add_circle')}</span>
                                    <span class="font-bold">${item.name}</span>
                                </div>
                                <span class="font-bold ${!active && isSpecial ? 'text-primary' : (active ? '' : 'text-secondary')}">¥${item.price.toLocaleString()}</span>
                            </button>
                        `;
                    }).join('')}
                </div>
            </section>
        `).join('');
        updateSummary();
    }

    // --- 設定画面の描画 ---
    function renderSettings() {
        document.getElementById('salon-name-input').value = state.salonName;
        document.getElementById('gas-url-input').value = state.gasUrl;
        const editor = document.getElementById('settings-menu-editor');
        editor.innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-4 mb-4">
                <div class="flex items-center justify-between border-b border-white/10 pb-2">
                    <div class="flex flex-col flex-1">
                        <input oninput="updateCategoryTitle(${cIdx}, this.value)" class="bg-transparent border-none font-bold text-primary p-0 focus:ring-0 w-full" value="${cat.title}" placeholder="カテゴリー名" />
                        <input oninput="updateCategorySubtitle(${cIdx}, this.value)" class="bg-transparent border-none text-[10px] text-slate-500 p-0 focus:ring-0 w-full uppercase" value="${cat.subtitle || ''}" placeholder="SUBTITLE" />
                    </div>
                    <button onclick="deleteCategory(${cIdx})" class="text-xs text-red-400">削除</button>
                </div>
                <div class="space-y-3">
                    ${cat.items.map((item, iIdx) => `
                        <div class="flex gap-2">
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'name', this.value)" class="flex-1 bg-background-dark/50 border border-white/10 rounded-lg text-xs text-white px-2 py-2" value="${item.name}" />
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'price', this.value)" class="w-20 bg-background-dark/50 border border-white/10 rounded-lg text-xs text-white px-2 py-2" type="number" value="${item.price}" />
                            <button onclick="deleteItem(${cIdx}, ${iIdx})" class="text-slate-500"><span class="material-symbols-outlined text-sm">delete</span></button>
                        </div>
                    `).join('')}
                    <button onclick="addItem(${cIdx})" class="w-full py-2 border border-dashed border-white/20 rounded-lg text-[10px] text-slate-500">+ 項目追加</button>
                </div>
            </div>
        `).join('');
    }

    // --- ロジック（onchangeをoninputに変えて即時性をアップ） ---
    function toggleItem(id, name, price) {
        const index = state.selectedItems.findIndex(i => i.id === id);
        if (index > -1) { state.selectedItems.splice(index, 1); }
        else { state.selectedItems.push({ id, name, price }); }
        renderMain();
    }

    function addCustomItem() {
        const name = document.getElementById('custom-name').value;
        const price = parseInt(document.getElementById('custom-price').value);
        if (!name || isNaN(price)) return;
        state.selectedItems.push({ id: "custom_" + Date.now(), name, price });
        document.getElementById('custom-name').value = "";
        document.getElementById('custom-price').value = "";
        renderMain();
    }

    function resetSelection() { state.selectedItems = []; renderMain(); }

    function updateSummary() {
        const total = state.selectedItems.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `選択済み: ${state.selectedItems.length}点`;
        const tags = document.getElementById('selected-items-tags');
        tags.innerHTML = state.selectedItems.map(item => `
            <span class="px-2 py-1 bg-secondary/10 border border-secondary/30 text-secondary text-[10px] font-bold rounded-full">${item.name} ¥${item.price.toLocaleString()}</span>
        `).join('');
    }

    // 保存と描画を分離せず、入力のたびに保存＆メインに反映
    function updateCategoryTitle(idx, val) { state.categories[idx].title = val; saveToLogal(); }
    function updateCategorySubtitle(idx, val) { state.categories[idx].subtitle = val; saveToLogal(); }
    function updateItem(cIdx, iIdx, key, val) { 
        state.categories[cIdx].items[iIdx][key] = key === 'price' ? parseInt(val) : val; 
        saveToLogal(); 
    }
    function saveToLogal() {
        localStorage.setItem('salon_pos_state_v2', JSON.stringify(state));
    }

    function addItem(cIdx) { state.categories[cIdx].items.push({ id: "i" + Date.now(), name: "新メニュー", price: 0 }); renderSettings(); saveToLogal(); }
    function deleteItem(cIdx, iIdx) { state.categories[cIdx].items.splice(iIdx, 1); renderSettings(); saveToLogal(); }
    function addNewCategory() { state.categories.push({ id: "c" + Date.now(), title: "新カテゴリー", subtitle: "NEW", items: [] }); renderSettings(); saveToLogal(); }
    function deleteCategory(idx) { state.categories.splice(idx, 1); renderSettings(); saveToLogal(); }

    function updateGasStatus() {
        const url = document.getElementById('gas-url-input')?.value || state.gasUrl;
        const status = document.getElementById('gas-status');
        if (status) {
            if (url && url.trim().startsWith('http')) {
                status.textContent = "設定済み ✔";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-green-900/50 text-green-400";
            } else {
                status.textContent = "未設定";
                status.className = "text-[10px] font-bold px-2 py-1 rounded bg-slate-800 text-slate-400";
            }
        }
    }

    function saveAllSettings() {
        state.salonName = document.getElementById('salon-name-input').value || state.salonName;
        state.gasUrl = document.getElementById('gas-url-input').value || state.gasUrl;
        saveToLogal();
        updateGasStatus();
        alert("設定を保存しました");
    }

    async function sendSalesData() {
        if (state.selectedItems.length === 0) { alert("項目が選択されていません。"); return; }
        if (!state.gasUrl || !state.gasUrl.startsWith('http')) { alert("URLを設定してください。"); return; }

        const total = state.selectedItems.reduce((sum, item) => sum + item.price, 0);
        const payload = {
            timestamp: new Date().toLocaleString('ja-JP'),
            salonName: state.salonName,
            items: state.selectedItems.map(i => i.name).join(', '),
            total: total
        };

        try {
            await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("売上を送信しました！");
            resetSelection();
        } catch (error) {
            alert("送信に失敗しました。");
        }
    }

    function renderAll() { renderMain(); renderSettings(); }
    init();
</script>
</body>
</html>
