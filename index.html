<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>美容室POS v1.20</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ecc813",
                        "secondary": "#f472b6",
                        "background-dark": "#0f0a15",
                        "neutral-dark": "#1e1629",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .gold-gradient { background: linear-gradient(135deg, #ecc813 0%, #b3970f 100%); }
        .pink-glow { box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .premium-border { border: 1px solid rgba(236, 200, 19, 0.3); }
        body { min-height: 100dvh; }
        .menu-item-active { @apply bg-secondary border-secondary text-background-dark pink-glow; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100">

<div id="app">
    <div id="main-screen">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">fluid</span>
                <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase" id="display-salon-name">Luxe Salon POS</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="openHistoryWithAuth()" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-secondary">menu_book</span>
                </button>
                <button onclick="switchScreen('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-primary">settings</span>
                </button>
            </div>
        </header>

        <main class="p-4 space-y-8 max-w-md mx-auto pb-72">
            <div id="menu-container" class="space-y-8"></div>
            
            <section class="space-y-4 pt-4 border-t border-white/10">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest px-2">手入力項目</h3>
                <div class="bg-neutral-dark p-6 rounded-2xl premium-border space-y-4">
                    <input id="custom-name" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none text-white" placeholder="項目名" type="text"/>
                    <input id="custom-price" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none text-white" placeholder="金額" type="number"/>
                    <button onclick="addCustomItem()" class="w-full py-3 bg-secondary/20 text-secondary border border-secondary/30 rounded-lg font-bold flex items-center justify-center gap-2">追加</button>
                </div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 bg-neutral-dark/95 backdrop-blur-xl border-t border-primary/30 p-4 pb-8">
            <div class="max-w-md mx-auto space-y-4">
                <div class="flex items-end justify-between px-2">
                    <div class="flex flex-col"><span id="item-count" class="text-secondary text-[10px] font-bold uppercase">選択済み: 0点</span><span class="text-slate-200 text-sm font-bold">合計金額</span></div>
                    <div class="text-right"><span id="total-display" class="text-4xl font-black text-white tracking-tighter">¥ 0</span></div>
                </div>
                <button onclick="sendSalesData()" class="w-full py-5 gold-gradient rounded-2xl text-background-dark font-black text-lg shadow-lg active:scale-[0.97]">売上を送信する</button>
            </div>
        </footer>
    </div>

    <div id="history-screen" class="hidden min-h-screen bg-background-dark pb-10">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-secondary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold tracking-widest text-secondary uppercase">売上帳簿</h1>
        </header>
        <main class="p-4 max-w-md mx-auto space-y-6">
            <div id="history-summary" class="grid grid-cols-1 gap-3"></div>
            <div id="history-details" class="hidden space-y-3 pt-6 border-t border-white/10">
                <h3 id="details-title" class="text-sm font-bold text-primary px-2"></h3>
                <div id="details-list" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <div id="settings-screen" class="hidden min-h-screen bg-background-dark">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase">設定</h1>
        </header>
        <main class="p-4 space-y-6 max-w-md mx-auto">
            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-bold text-primary tracking-widest uppercase">GAS URL</label>
                    <button onclick="document.getElementById('gas-url-input').value=''; sync();" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded border border-red-800/50">クリア</button>
                </div>
                <input id="gas-url-input" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-2 text-xs text-white outline-none" placeholder="https://..." type="text"/>
                <button onclick="saveAllSettings()" class="w-full py-2 bg-primary text-background-dark font-bold rounded-lg text-sm">設定を保存</button>
            </div>
            <div id="settings-menu-editor" class="space-y-4"></div>
            <button onclick="addNewCategory()" class="w-full py-4 border-2 border-dashed border-primary/30 rounded-xl text-primary font-bold active:scale-95 transition-all">+ カテゴリー追加</button>
        </main>
    </div>
</div>

<script>
    let state = {
        salonName: "Luxe Salon POS", gasUrl: "", selectedItems: [],
        categories: [{ id: "cat1", title: "カット", subtitle: "CUT", items: [{ id: "i1", name: "ドライカット", price: 1800 }] }]
    };

    function init() {
        const saved = localStorage.getItem('salon_pos_final_data');
        if (saved) state = { ...state, ...JSON.parse(saved), selectedItems: [] };
        renderAll();
    }

    function switchScreen(screen) {
        ['main-screen', 'history-screen', 'settings-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screen + '-screen').classList.remove('hidden');
    }

    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        container.innerHTML = state.categories.map(cat => `
            <section class="space-y-4">
                <div class="flex items-center gap-2 px-2"><div class="h-4 w-1 bg-secondary rounded-full"></div><h2 class="text-lg font-bold">${cat.title}</h2></div>
                <div class="grid grid-cols-1 gap-3">
                    ${cat.items.map(item => `
                        <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" class="flex items-center justify-between p-4 rounded-xl border w-full ${state.selectedItems.some(si => si.id === item.id) ? 'menu-item-active' : 'bg-neutral-dark premium-border'}">
                            <span class="font-bold">${item.name}</span><span class="font-bold text-secondary">¥${item.price.toLocaleString()}</span>
                        </button>
                    `).join('')}
                </div>
            </section>
        `).join('');
        updateSummary();
    }

    function renderSettings() {
        document.getElementById('gas-url-input').value = state.gasUrl;
        const editor = document.getElementById('settings-menu-editor');
        editor.innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-4">
                <input oninput="state.categories[${cIdx}].title = this.value; sync();" class="bg-transparent border-none font-bold text-primary p-0 w-full text-lg" value="${cat.title}" />
                <div class="space-y-3">
                    ${cat.items.map((item, iIdx) => `
                        <div class="flex gap-2">
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'name', this.value)" class="flex-1 bg-background-dark/50 border border-white/10 rounded-lg text-xs text-white px-2 py-2" value="${item.name}" />
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'price', this.value)" class="w-20 bg-background-dark/50 border border-white/10 rounded-lg text-xs text-white px-2 py-2" type="number" value="${item.price}" />
                        </div>
                    `).join('')}
                    <button onclick="addItem(${cIdx})" class="text-[10px] text-slate-500">+ 項目追加</button>
                </div>
            </div>
        `).join('');
    }

    async function openHistoryWithAuth() {
        const pass = prompt("履歴閲覧パスワードを入力してください");
        if (!pass) return;
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass }) });
            const data = await res.json();
            if (data.error) return alert(data.error);
            renderHistory(data.summary, pass);
            switchScreen('history');
        } catch (e) { alert("通信エラー"); }
    }

    function renderHistory(summary, pass) {
        const container = document.getElementById('history-summary');
        const months = Object.keys(summary).sort().reverse();
        let totalYear = 0;
        container.innerHTML = months.map(m => {
            totalYear += summary[m];
            return `<button onclick="fetchDetails('${m}', '${pass}')" class="flex justify-between p-4 bg-neutral-dark rounded-xl border border-white/5 active:scale-95">
                <span class="font-bold text-slate-300">${m}</span>
                <span class="font-bold text-secondary">¥${summary[m].toLocaleString()}</span>
            </button>`;
        }).join('') + `<div class="p-4 bg-primary/10 border border-primary/30 rounded-xl flex justify-between"><span class="font-black text-primary">年合計</span><span class="font-black text-primary text-xl">¥${totalYear.toLocaleString()}</span></div>`;
    }

    async function fetchDetails(month, pass) {
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass, month: month }) });
            const data = await res.json();
            const list = document.getElementById('details-list');
            document.getElementById('details-title').textContent = month + " の明細";
            list.innerHTML = data.details.map(d => `<div class="flex justify-between p-3 bg-background-dark border border-white/5 rounded-lg text-xs"><span class="text-slate-400">${d.date}</span><span class="font-bold text-white">¥${d.price.toLocaleString()}</span></div>`).join('');
            document.getElementById('history-details').classList.remove('hidden');
        } catch (e) { alert("詳細取得失敗"); }
    }

    function toggleItem(id, name, price) {
        const idx = state.selectedItems.findIndex(i => i.id === id);
        if (idx > -1) state.selectedItems.splice(idx, 1);
        else state.selectedItems.push({ id, name, price });
        renderMain();
    }

    function updateSummary() {
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `選択済み: ${state.selectedItems.length}点`;
    }

    function updateItem(cIdx, iIdx, key, val) { state.categories[cIdx].items[iIdx][key] = key === 'price' ? parseInt(val) || 0 : val; sync(); }
    function sync() { localStorage.setItem('salon_pos_final_data', JSON.stringify(state)); }
    function addItem(cIdx) { state.categories[cIdx].items.push({ id: "i" + Date.now(), name: "新メニュー", price: 0 }); renderSettings(); sync(); }
    function addNewCategory() { state.categories.push({ id: "c" + Date.now(), title: "新カテゴリー", items: [] }); renderSettings(); sync(); }
    function saveAllSettings() { state.gasUrl = document.getElementById('gas-url-input').value; sync(); alert("保存完了"); }

    async function sendSalesData() {
        if (!state.selectedItems.length || !state.gasUrl) return alert("項目未選択/URL未設定");
        const payload = { timestamp: new Date().toLocaleString('ja-JP'), items: state.selectedItems.map(i => i.name).join(', '), total: state.selectedItems.reduce((s, i) => s + i.price, 0) };
        try { await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); alert("送信完了"); state.selectedItems = []; renderMain(); } catch (e) { alert("送信エラー"); }
    }

    function renderAll() { renderMain(); renderSettings(); }
    init();
</script>
</body>
</html>
