<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Salon POS v1.68 Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ecc813", "secondary": "#f472b6", "background-dark": "#0f0a15", "neutral-dark": "#1e1629" } } }
        }
    </script>
    <style type="text/tailwindcss">
        .gold-gradient { background: linear-gradient(135deg, #ecc813 0%, #b3970f 100%); }
        .premium-border { border: 1px solid rgba(236, 200, 19, 0.3); }
        .menu-item-active { @apply bg-secondary border-secondary text-background-dark font-bold; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .clock-font { font-family: 'Manrope', sans-serif; letter-spacing: -0.05em; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">

<div id="app">
    <div id="setup-screen" class="fixed inset-0 z-[110] bg-background-dark flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-sm space-y-6 text-center">
            <span class="material-symbols-outlined text-primary text-6xl">settings_suggest</span>
            <h2 class="text-xl font-black text-primary uppercase italic">Initial Setup</h2>
            <div class="space-y-4">
                <input id="setup-salon-name" type="text" placeholder="サロン名" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-white outline-none focus:border-primary" />
                <input id="setup-gas-url" type="text" placeholder="GAS ウェブアプリURL" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-xs text-white outline-none focus:border-primary" />
                <input id="setup-password" type="password" placeholder="アプリ用パスワード" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary" />
            </div>
            <button onclick="runInitialSetup()" class="w-full py-4 gold-gradient rounded-xl text-background-dark font-bold shadow-lg">設定を完了</button>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 z-[100] bg-background-dark flex items-center justify-center p-6 hidden text-center">
        <div class="w-full max-w-xs space-y-6">
            <span class="material-symbols-outlined text-primary text-6xl">lock</span>
            <input id="app-password" type="password" placeholder="Password" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary" />
            <button onclick="checkAppLock()" id="unlock-btn" class="w-full py-4 gold-gradient rounded-xl text-background-dark font-bold">Unlock</button>
        </div>
    </div>

    <div id="main-screen">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">fluid</span>
                <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase" id="display-salon-name">Salon</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="logout()" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-500/10 border border-red-500/30"><span class="material-symbols-outlined text-red-400 text-xl">logout</span></button>
                <button onclick="openHistory()" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary text-xl">menu_book</span></button>
                <button onclick="switchScreen('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary text-xl">settings</span></button>
            </div>
        </header>

        <section class="px-6 py-8 text-left bg-gradient-to-b from-primary/5 to-transparent border-b border-white/5">
            <div class="flex items-baseline gap-4 clock-font">
                <span id="display-date" class="text-7xl font-extrabold text-white leading-none tracking-tighter">--/--</span>
                <span id="display-day-time" class="text-xl font-bold text-primary italic">(曜) --:--</span>
            </div>
        </section>

        <main id="menu-container" class="p-4 space-y-8 max-w-md mx-auto pb-96"></main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 bg-neutral-dark/95 backdrop-blur-xl border-t border-primary/30 p-4 pb-8">
            <div class="max-w-md mx-auto space-y-4 text-left">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/5 space-y-3">
                    <span class="text-[10px] font-bold text-slate-500 uppercase italic">Manual Entry</span>
                    <div class="flex gap-2">
                        <input id="manual-name" type="text" placeholder="項目名" class="flex-1 bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-xs text-white" />
                        <input id="manual-price" type="number" placeholder="金額" class="w-24 bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-xs text-white" />
                        <button onclick="addManualItem()" class="px-4 py-2 bg-secondary/20 border border-secondary/40 text-secondary text-xs font-bold rounded-lg">追加</button>
                    </div>
                </div>

                <div id="selected-list-area" class="hidden">
                    <div id="selected-tags-container" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="flex items-end justify-between border-t border-white/5 pt-2">
                    <div class="flex flex-col"><span id="item-count" class="text-secondary text-[10px] font-bold">0点</span><span class="text-slate-200 text-sm font-bold">合計金額</span></div>
                    <span id="total-display" class="text-4xl font-black text-white italic">¥ 0</span>
                </div>
                <button onclick="sendSalesData()" id="send-btn" class="w-full py-5 gold-gradient rounded-2xl text-background-dark font-black text-lg shadow-lg active:scale-95 transition-all">売上を送信する</button>
            </div>
        </footer>
    </div>

    <div id="settings-screen" class="hidden min-h-screen bg-background-dark pb-20">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-primary uppercase">Settings</h1>
        </header>
        <main class="p-4 space-y-6 max-w-md mx-auto text-left">
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4">
                <div><label class="text-[10px] font-bold text-primary uppercase">Salon Name</label>
                <input id="salon-name-input" class="w-full bg-background-dark border border-white/10 rounded-lg px-4 py-2 text-white mt-1" /></div>
                <div><label class="text-[10px] font-bold text-primary uppercase">GAS URL</label>
                <div class="flex gap-2"><input id="gas-url-input" class="flex-1 bg-background-dark border border-white/10 rounded-lg px-4 py-2 text-[10px] text-white" /><button onclick="clearGasUrl()" class="text-red-400 text-[10px] font-bold underline">RESET</button></div></div>
                <button onclick="saveAllSettings()" class="w-full py-3 gold-gradient text-background-dark font-black rounded-xl">設定を保存</button>
            </div>
            <div id="settings-menu-editor" class="space-y-6"></div>
            <button onclick="addCategory()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-slate-500 font-bold">+ カテゴリを追加</button>
        </main>
    </div>

    <div id="history-screen" class="hidden min-h-screen bg-background-dark">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-secondary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-secondary uppercase">History</h1>
        </header>
        <main id="history-content" class="p-4 max-w-md mx-auto space-y-3"></main>
    </div>
</div>

<script>
    const VERSION = "v1.68 Professional";
    let state = {
        salonName: "Luxe Salon", gasUrl: "", selectedItems: [],
        categories: [
            { id: "c1", title: "カット", items: [{ id: "i1", name: "ドライカット", price: 1800 }, { id: "i2", name: "カット", price: 2700 }, { id: "i3", name: "前髪カット", price: 500 }] },
            { id: "c2", title: "パーマ", items: [{ id: "i4", name: "部分パーマ", price: 3500 }, { id: "i5", name: "パーマ", price: 5500 }, { id: "i6", name: "クリームパーマ", price: 6500 }, { id: "i7", name: "クリープパーマ", price: 7500 }, { id: "i8", name: "デジタルパーマ", price: 9500 }] },
            { id: "c3", title: "カラー", items: [{ id: "i9", name: "グレイカラーリタッチ", price: 3500 }, { id: "i10", name: "グレイカラー", price: 4000 }, { id: "i11", name: "カラーリタッチ", price: 4500 }, { id: "i12", name: "カラー", price: 5000 }, { id: "i13", name: "トリートメントカラー", price: 7700 }, { id: "i14", name: "メテオカラー", price: 8800 }] },
            { id: "c4", title: "ストレート", items: [{ id: "i15", name: "縮毛矯正", price: 13000 }, { id: "i16", name: "前髪のみ", price: 3000 }, { id: "i17", name: "前髪サイド", price: 5000 }] }
        ]
    };

    function init() {
        const saved = localStorage.getItem('salon_pos_v168_data');
        if (saved) state = { ...state, ...JSON.parse(saved), selectedItems: [] };
        const pName = localStorage.getItem('salon_name_permanent');
        if (pName) state.salonName = pName;

        if (!state.gasUrl) {
            document.getElementById('setup-screen').classList.remove('hidden');
        } else {
            const lastAuth = localStorage.getItem('last_auth_v168');
            if (lastAuth === new Date().toLocaleDateString()) { renderMain(); switchScreen('main'); }
            else { document.getElementById('lock-screen').classList.remove('hidden'); }
        }
        updateClock(); setInterval(updateClock, 30000);
    }

    function updateClock() {
        const now = new Date();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        document.getElementById('display-date').textContent = `${now.getMonth() + 1}/${now.getDate()}`;
        document.getElementById('display-day-time').textContent = `(${days[now.getDay()]}) ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        container.innerHTML = state.categories.map(cat => `
            <div class="space-y-4 text-left">
                <div class="px-2 border-l-4 border-secondary ml-1 font-bold text-slate-300 uppercase text-sm tracking-widest">${cat.title}</div>
                <div class="grid gap-3">${cat.items.map(item => `
                    <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" class="flex justify-between items-center p-5 rounded-2xl border transition-all ${state.selectedItems.some(si => si.id === item.id) ? 'menu-item-active' : 'bg-neutral-dark premium-border'}">
                        <span class="text-sm font-medium">${item.name}</span><span class="font-bold">¥${item.price.toLocaleString()}</span>
                    </button>`).join('')}
                </div>
            </div>`).join('');
        updateSummary();
    }

    async function checkAppLock() {
        const input = document.getElementById('app-password').value;
        const btn = document.getElementById('unlock-btn');
        btn.disabled = true; btn.textContent = "Verifying...";
        try {
            const res = await fetch(`${state.gasUrl}?action=checkPass&pass=${encodeURIComponent(input)}`);
            const result = await res.json();
            if(result.status === "success") {
                localStorage.setItem('last_auth_v168', new Date().toLocaleDateString());
                document.getElementById('lock-screen').classList.add('hidden');
                renderMain();
            } else { alert("パスワードが違います"); }
        } catch(e) { alert("通信エラー: GASのURLを確認してください"); }
        finally { btn.disabled = false; btn.textContent = "Unlock"; }
    }

    async function openHistory() {
        switchScreen('history');
        const container = document.getElementById('history-content');
        container.innerHTML = '<div class="text-center py-20 text-slate-500 font-bold animate-pulse">Fetching records...</div>';
        try {
            const res = await fetch(`${state.gasUrl}?action=history`);
            const data = await res.json();
            if(!data || data.length === 0) { container.innerHTML = '<div class="text-center py-20 italic">No history found</div>'; return; }
            container.innerHTML = data.reverse().slice(0, 30).map(row => `
                <div class="bg-neutral-dark/80 p-5 rounded-2xl border border-white/5 flex justify-between items-center shadow-sm">
                    <div class="text-left"><div class="text-[10px] text-slate-500 font-bold mb-1 uppercase">${row[0]}</div><div class="text-sm font-bold text-slate-200 truncate w-40">${row[1]}</div></div>
                    <div class="text-xl font-black text-secondary italic">¥${parseInt(row[2]).toLocaleString()}</div>
                </div>`).join('');
        } catch(e) { container.innerHTML = '<div class="text-center py-20 text-red-400 font-bold">Failed to load history</div>'; }
    }

    async function runInitialSetup() {
        const sn = document.getElementById('setup-salon-name').value;
        const url = document.getElementById('setup-gas-url').value;
        const pass = document.getElementById('setup-password').value;
        if(!sn || !url || !pass) return alert("すべて入力してください");
        state.salonName = sn; state.gasUrl = url;
        localStorage.setItem('salon_name_permanent', sn);
        try {
            await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updatePassword', newPassword: pass }) });
            localStorage.setItem('salon_pos_v168_data', JSON.stringify(state));
            location.reload();
        } catch(e) { alert("URLが無効です"); }
    }

    function toggleItem(id, name, price) {
        const idx = state.selectedItems.findIndex(i => i.id === id);
        if (idx > -1) state.selectedItems.splice(idx, 1);
        else state.selectedItems.push({ id, name, price });
        renderMain();
    }

    function addManualItem() {
        const name = document.getElementById('manual-name').value;
        const price = parseInt(document.getElementById('manual-price').value);
        if(!name || isNaN(price)) return;
        state.selectedItems.push({ id: 'm-'+Date.now(), name, price });
        document.getElementById('manual-name').value = '';
        document.getElementById('manual-price').value = '';
        renderMain();
    }

    function updateSummary() {
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `${state.selectedItems.length} items`;
        const area = document.getElementById('selected-list-area');
        if (state.selectedItems.length > 0) {
            area.classList.remove('hidden');
            document.getElementById('selected-tags-container').innerHTML = state.selectedItems.map(item => `<span class="px-3 py-1 bg-secondary/10 border border-secondary/30 text-secondary text-[10px] rounded-full font-black">・${item.name}</span>`).join('');
        } else { area.classList.add('hidden'); }
    }

    async function sendSalesData() {
        if (!state.selectedItems.length) return;
        const btn = document.getElementById('send-btn');
        btn.disabled = true; btn.textContent = "Sending...";
        const payload = { timestamp: new Date().toLocaleString('ja-JP'), items: state.selectedItems.map(i => i.name).join(','), total: state.selectedItems.reduce((s,i)=>s+i.price,0) };
        try {
            await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Sent!"); state.selectedItems = []; renderMain();
        } catch(e) { alert("Error!"); }
        finally { btn.disabled = false; btn.textContent = "売上を送信する"; }
    }

    function renderSettings() {
        document.getElementById('salon-name-input').value = state.salonName;
        document.getElementById('gas-url-input').value = state.gasUrl;
        const editor = document.getElementById('settings-menu-editor');
        editor.innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4">
                <div class="flex gap-2">
                    <input oninput="state.categories[${cIdx}].title = this.value" class="flex-1 bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-white font-bold" value="${cat.title}" />
                    <button onclick="removeCategory(${cIdx})" class="text-red-400 material-symbols-outlined">delete</button>
                </div>
                <div class="space-y-2">${cat.items.map((item, iIdx) => `
                    <div class="flex gap-2">
                        <input oninput="state.categories[${cIdx}].items[${iIdx}].name = this.value" class="flex-1 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" value="${item.name}" />
                        <input oninput="state.categories[${cIdx}].items[${iIdx}].price = parseInt(this.value) || 0" class="w-20 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" type="number" value="${item.price}" />
                        <button onclick="removeItem(${cIdx}, ${iIdx})" class="text-slate-500 material-symbols-outlined text-sm">close</button>
                    </div>`).join('')}
                </div>
                <button onclick="addItem(${cIdx})" class="w-full py-2 bg-white/5 rounded-lg text-[10px] text-slate-400 font-bold uppercase">+ Add Item</button>
            </div>`).join('');
    }

    function addCategory() { state.categories.push({ id: 'c'+Date.now(), title: "NEW CATEGORY", items: [] }); renderSettings(); }
    function removeCategory(idx) { if(confirm('Delete Category?')) { state.categories.splice(idx, 1); renderSettings(); } }
    function addItem(cIdx) { state.categories[cIdx].items.push({ id: 'i'+Date.now(), name: "New Item", price: 0 }); renderSettings(); }
    function removeItem(cIdx, iIdx) { state.categories[cIdx].items.splice(iIdx, 1); renderSettings(); }

    function saveAllSettings() {
        state.salonName = document.getElementById('salon-name-input').value;
        state.gasUrl = document.getElementById('gas-url-input').value;
        localStorage.setItem('salon_name_permanent', state.salonName);
        localStorage.setItem('salon_pos_v168_data', JSON.stringify(state));
        alert("Saved!"); switchScreen('main');
    }

    function switchScreen(s) { 
        ['main-screen', 'settings-screen', 'history-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(s + '-screen').classList.remove('hidden');
        if(s==='settings') renderSettings();
        if(s==='main') renderMain();
    }
    function logout() { localStorage.removeItem('last_auth_v168'); location.reload(); }
    function clearGasUrl() { if(confirm('RESET ALL DATA?')){localStorage.clear(); location.reload();} }
    function resetSelection() { state.selectedItems = []; renderMain(); }

    init();
</script>
</body>
</html>
