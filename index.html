<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>美容室POS v1.56 Final-Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: { colors: { "primary": "#ecc813", "secondary": "#f472b6", "background-dark": "#0f0a15", "neutral-dark": "#1e1629" } } }
        }
    </script>
    <style type="text/tailwindcss">
        .gold-gradient { background: linear-gradient(135deg, #ecc813 0%, #b3970f 100%); }
        .premium-border { border: 1px solid rgba(236, 200, 19, 0.3); }
        .menu-item-active { @apply bg-secondary border-secondary text-background-dark font-bold; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .clock-font { font-family: 'Manrope', sans-serif; letter-spacing: -0.05em; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">

<div id="app">
    <div id="setup-screen" class="fixed inset-0 z-[110] bg-background-dark flex items-center justify-center p-6 hidden text-center">
        <div class="w-full max-w-sm space-y-6">
            <span class="material-symbols-outlined text-primary text-6xl">settings_suggest</span>
            <h2 class="text-xl font-black text-primary uppercase tracking-widest">Initial Setup</h2>
            <div class="space-y-4">
                <input id="setup-salon-name" type="text" placeholder="サロン名" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-white outline-none focus:border-primary" />
                <input id="setup-gas-url" type="text" placeholder="GAS URL" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-sm text-white outline-none focus:border-primary" />
                <input id="setup-password" type="password" placeholder="Password" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary" />
            </div>
            <button onclick="runInitialSetup()" class="w-full py-4 gold-gradient rounded-xl text-background-dark font-bold">開始</button>
        </div>
    </div>

    <div id="lock-screen" class="fixed inset-0 z-[100] bg-background-dark flex items-center justify-center p-6 hidden text-center">
        <div class="w-full max-w-xs space-y-6">
            <span class="material-symbols-outlined text-primary text-6xl">lock</span>
            <input id="app-password" type="password" placeholder="Pass" class="w-full bg-neutral-dark border border-white/10 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary" />
            <button onclick="checkAppLock()" class="w-full py-4 gold-gradient rounded-xl text-background-dark font-bold">Unlock</button>
        </div>
    </div>

    <div id="main-screen">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">fluid</span>
                <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase" id="display-salon-name">Salon</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="logout()" class="w-10 h-10 rounded-full flex items-center justify-center bg-red-500/10 border border-red-500/30"><span class="material-symbols-outlined text-red-400 text-xl">logout</span></button>
                <button onclick="openHistoryWithAuth()" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">menu_book</span></button>
                <button onclick="switchScreen('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">settings</span></button>
            </div>
        </header>

        <section class="px-6 py-8 text-left bg-gradient-to-b from-primary/5 to-transparent border-b border-white/5">
            <div class="flex items-baseline gap-4 clock-font">
                <span id="display-date" class="text-7xl font-extrabold text-white leading-none tracking-tighter">--/--</span>
                <span id="display-day-time" class="text-xl font-bold text-primary italic">--:--</span>
            </div>
        </section>

        <main id="menu-container" class="p-4 space-y-8 max-w-md mx-auto pb-48 text-left"></main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 bg-neutral-dark/95 backdrop-blur-xl border-t border-primary/30 p-4 pb-8">
            <div class="max-w-md mx-auto flex items-center justify-between px-2">
                <div class="flex flex-col">
                    <span id="item-count" class="text-secondary text-[10px] font-bold uppercase tracking-widest">0 items</span>
                    <span id="total-display" class="text-4xl font-black text-white italic tracking-tighter">¥ 0</span>
                </div>
                <button onclick="sendSalesData()" class="px-10 py-4 gold-gradient rounded-2xl text-background-dark font-black text-lg shadow-lg active:scale-95">送信する</button>
            </div>
        </footer>
    </div>

    <div id="history-screen" class="hidden min-h-screen bg-background-dark pb-20">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-secondary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-secondary uppercase tracking-widest">History</h1>
        </header>
        <main id="history-main" class="p-4 max-w-md mx-auto space-y-6 text-left">
            <div class="bg-neutral-dark p-4 rounded-xl border border-white/5">
                <select id="year-selector" onchange="refreshHistory()" class="w-full bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-white font-bold outline-none">
                    <option value="2025">2025</option><option value="2026" selected>2026</option>
                </select>
            </div>
            <div id="history-summary" class="grid gap-3"></div>
            <div id="history-details" class="hidden space-y-3 pt-6 border-t border-white/10">
                <div id="details-list" class="grid gap-2"></div>
            </div>
        </main>
    </div>

    <div id="settings-screen" class="hidden min-h-screen bg-background-dark pb-20">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold text-primary uppercase">Settings</h1>
        </header>
        <main class="p-4 space-y-6 max-w-md mx-auto text-left">
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4 shadow-xl">
                <div><label class="text-[10px] font-bold text-primary uppercase italic">Salon Name</label><input id="salon-name-input" class="w-full bg-background-dark border border-white/10 rounded-lg px-4 py-2 text-white mt-1" /></div>
                <div><label class="text-[10px] font-bold text-primary uppercase italic">GAS URL</label><div class="flex gap-2"><input id="gas-url-input" class="flex-1 bg-background-dark border border-white/10 rounded-lg px-4 py-2 text-xs text-white" /><button onclick="clearGasUrl()" class="text-red-400 text-[10px] font-bold underline italic">RESET</button></div></div>
                <button onclick="saveAllSettings()" class="w-full py-3 gold-gradient text-background-dark font-black rounded-xl">保存</button>
            </div>
            <div id="settings-menu-editor" class="space-y-6"></div>
            <button onclick="addNewCategory()" class="w-full py-4 border-2 border-dashed border-white/10 rounded-2xl text-slate-500 font-bold">+ カテゴリを追加</button>
        </main>
    </div>
</div>

<script>
    const VERSION = "v1.56 Final";
    let lastPass = ""; 
    let state = { version: VERSION, salonName: "Salon", gasUrl: "", selectedItems: [], categories: [] };

    const DEFAULT_CATS = [
        { id: "c1", title: "カット", items: [{ id: "i1", name: "ドライカット", price: 1800 }, { id: "i2", name: "カット", price: 2700 }] },
        { id: "c2", title: "カラー", items: [{ id: "i12", name: "カラー", price: 5000 }] }
    ];

    function init() {
        const saved = localStorage.getItem('salon_pos_final_data');
        state = saved ? { ...state, ...JSON.parse(saved), selectedItems: [] } : { ...state, categories: DEFAULT_CATS };
        const pName = localStorage.getItem('salon_name_permanent');
        if (pName) state.salonName = pName;

        if (!state.gasUrl) document.getElementById('setup-screen').classList.remove('hidden');
        else {
            lastPass = localStorage.getItem('cached_pass') || "";
            if (localStorage.getItem('last_auth_date') === new Date().toLocaleDateString() && lastPass) renderMain();
            else document.getElementById('lock-screen').classList.remove('hidden');
        }
        updateClock(); setInterval(updateClock, 10000);
    }

    function updateClock() {
        const now = new Date();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        document.getElementById('display-date').textContent = `${now.getMonth() + 1}/${now.getDate()}`;
        document.getElementById('display-day-time').textContent = `(${days[now.getDay()]}) ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        
        let html = state.categories.map(cat => `
            <div class="space-y-4">
                <div class="px-2 border-l-4 border-secondary ml-1 font-bold text-slate-300 uppercase text-sm tracking-widest">${cat.title}</div>
                <div class="grid gap-3">${cat.items.map(item => `
                    <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" class="flex justify-between items-center p-5 rounded-2xl border transition-all ${state.selectedItems.some(si => si.id === item.id) ? 'menu-item-active' : 'bg-neutral-dark premium-border'}">
                        <span class="text-sm font-medium tracking-wide">${item.name}</span><span class="font-bold">¥${item.price.toLocaleString()}</span>
                    </button>`).join('')}
                </div>
            </div>`).join('');

        html += `
            <div class="mt-16 pb-32 space-y-6">
                <div class="bg-neutral-dark p-6 rounded-3xl border border-white/5 space-y-4 shadow-xl">
                    <span class="text-[10px] font-bold text-slate-500 uppercase italic tracking-widest block border-b border-white/5 pb-2">Manual Entry</span>
                    <div class="space-y-3">
                        <input id="custom-name" type="text" placeholder="項目名" class="w-full bg-background-dark border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-secondary" />
                        <div class="flex gap-2">
                            <input id="custom-price" type="number" placeholder="金額" class="flex-1 bg-background-dark border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-secondary" />
                            <button onclick="addCustomItem()" class="px-8 py-3 bg-secondary/10 border border-secondary/30 text-secondary font-bold rounded-xl active:scale-95">追加</button>
                        </div>
                    </div>
                </div>
                <div id="selected-list-area" class="hidden bg-white/5 rounded-3xl p-6 border border-white/10 shadow-2xl">
                    <div class="flex justify-between items-center mb-4"><span class="text-[10px] font-bold text-secondary uppercase italic tracking-widest">Receipt Detail</span><button onclick="resetSelection()" class="text-[9px] text-slate-500 underline">Clear All</button></div>
                    <div id="selected-items-list" class="space-y-3"></div>
                </div>
            </div>`;
        container.innerHTML = html;
        updateSummary();
    }

    function toggleItem(id, name, price) {
        const idx = state.selectedItems.findIndex(i => i.id === id);
        if (idx > -1) state.selectedItems.splice(idx, 1);
        else state.selectedItems.push({ id, name, price });
        renderMain();
    }

    function updateSummary() {
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `${state.selectedItems.length} items`;
        const area = document.getElementById('selected-list-area');
        const list = document.getElementById('selected-items-list');
        if (state.selectedItems.length > 0) {
            area.classList.remove('hidden');
            list.innerHTML = state.selectedItems.map((item, index) => `
                <div class="flex justify-between items-center text-sm border-b border-white/5 pb-3 last:border-0">
                    <span class="font-bold text-slate-200 truncate pr-4">${item.name}</span>
                    <div class="flex items-center gap-3 shrink-0"><span class="font-mono text-white font-bold italic">¥${item.price.toLocaleString()}</span><button onclick="removeItem(${index})" class="material-symbols-outlined text-slate-500 text-lg">cancel</button></div>
                </div>`).join('');
        } else area.classList.add('hidden');
    }

    function removeItem(idx) { state.selectedItems.splice(idx, 1); renderMain(); }
    function resetSelection() { state.selectedItems = []; renderMain(); }
    function addCustomItem() {
        const n = document.getElementById('custom-name').value;
        const p = parseInt(document.getElementById('custom-price').value);
        if (!n || isNaN(p)) return;
        state.selectedItems.push({ id: "cus"+Date.now(), name: n, price: p });
        renderMain();
    }

    async function sendSalesData() {
        if (!state.selectedItems.length || !state.gasUrl) return;
        const payload = { timestamp: new Date().toLocaleString('ja-JP'), items: state.selectedItems.map(i => i.name).join(','), total: state.selectedItems.reduce((s,i)=>s+i.price,0) };
        try { 
            await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }); 
            alert("Success"); resetSelection();
        } catch(e) { alert("Error"); }
    }

    // ★履歴機能 (v1.56：最新月自動展開)
    function openHistoryWithAuth() { if (state.gasUrl) refreshHistory(); else alert("No URL"); }

    async function refreshHistory() {
        const year = document.getElementById('year-selector').value;
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: lastPass, year: year }) });
            const data = await res.json();
            const months = Object.keys(data.summary).sort().reverse();
            document.getElementById('history-summary').innerHTML = months.map(m => `
                <button onclick="fetchDetails('${m}')" class="flex justify-between p-5 bg-neutral-dark rounded-xl border border-white/5 active:scale-95 shadow-xl">
                    <span class="font-bold text-slate-300 uppercase">${m}</span><span class="font-bold text-secondary text-lg italic">¥${data.summary[m].toLocaleString()}</span>
                </button>`).join('');
            
            // 最新月があれば自動で詳細を表示
            if (months.length > 0) fetchDetails(months[0]);
            switchScreen('history');
        } catch (e) { alert("Error"); }
    }

    async function fetchDetails(month) {
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: lastPass, month: month }) });
            const data = await res.json();
            document.getElementById('details-list').innerHTML = data.details.map(d => `
                <div class="flex justify-between p-4 bg-neutral-dark border border-white/5 rounded-lg text-xs">
                    <span class="text-slate-400 font-bold">${d.date}</span>
                    <span class="font-black text-white italic">¥${d.price.toLocaleString()}</span>
                </div>`).join('');
            document.getElementById('history-details').classList.remove('hidden');
        } catch (e) { alert("Details Error"); }
    }

    // 設定・認証（1.51準拠）
    async function runInitialSetup() {
        const name = document.getElementById('setup-salon-name').value;
        const url = document.getElementById('setup-gas-url').value;
        const pass = document.getElementById('setup-password').value;
        if (!name || !url || !pass) return;
        state.gasUrl = url; state.salonName = name;
        localStorage.setItem('salon_name_permanent', name);
        await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updatePassword', newPassword: pass }) });
        lastPass = pass; localStorage.setItem('cached_pass', pass);
        localStorage.setItem('last_auth_date', new Date().toLocaleDateString());
        saveAllSettings(true); location.reload();
    }

    async function checkAppLock() {
        const pass = document.getElementById('app-password').value;
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass, year: new Date().getFullYear().toString() }) });
            const data = await res.json();
            if (data.error) return alert("Wrong");
            lastPass = pass; localStorage.setItem('cached_pass', pass);
            localStorage.setItem('last_auth_date', new Date().toLocaleDateString());
            document.getElementById('lock-screen').classList.add('hidden'); renderMain();
        } catch (e) { alert("Error"); }
    }

    function switchScreen(s) {
        ['main-screen', 'settings-screen', 'history-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(s + '-screen').classList.remove('hidden');
        if (s === 'main') renderMain();
        if (s === 'settings') renderSettings();
    }

    function renderSettings() {
        document.getElementById('salon-name-input').value = state.salonName;
        document.getElementById('gas-url-input').value = state.gasUrl;
        document.getElementById('settings-menu-editor').innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4 relative shadow-lg">
                <button onclick="deleteCategory(${cIdx})" class="absolute top-4 right-4 text-red-500 text-xs font-bold underline italic">DELETE</button>
                <input oninput="state.categories[${cIdx}].title = this.value" class="bg-background-dark border border-white/10 rounded-lg px-3 py-2 text-white font-bold w-40 outline-none" value="${cat.title}" />
                <div class="space-y-3 pt-2">
                    ${cat.items.map((item, iIdx) => `
                        <div class="flex gap-2">
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'name', this.value)" class="flex-1 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" value="${item.name}" />
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'price', this.value)" class="w-24 bg-background-dark border border-white/10 rounded-lg text-xs text-white p-2" type="number" value="${item.price}" />
                        </div>`).join('')}
                    <button onclick="addItem(${cIdx})" class="w-full py-2 bg-white/5 rounded text-[10px] text-slate-400 font-bold">+ 項目</button>
                </div>
            </div>`).join('');
    }

    function saveAllSettings(silent = false) {
        if (!silent) {
            state.salonName = document.getElementById('salon-name-input').value;
            state.gasUrl = document.getElementById('gas-url-input').value;
            localStorage.setItem('salon_name_permanent', state.salonName);
        }
        localStorage.setItem('salon_pos_final_data', JSON.stringify(state));
        if (!silent) { alert("Saved"); switchScreen('main'); }
    }

    function clearGasUrl() { if(confirm('RESET ALL?')) { localStorage.clear(); location.reload(); } }
    function logout() { localStorage.removeItem('cached_pass'); localStorage.removeItem('last_auth_date'); location.reload(); }
    function updateItem(cIdx, iIdx, key, val) { state.categories[cIdx].items[iIdx][key] = key === 'price' ? parseInt(val) || 0 : val; }
    function addItem(cIdx) { state.categories[cIdx].items.push({ id: "i"+Date.now(), name: "新項目", price: 0 }); renderSettings(); }
    function addNewCategory() { state.categories.push({ id: "c"+Date.now(), title: "新カテゴリ", items: [] }); renderSettings(); }
    function deleteCategory(idx) { if(confirm('OK?')) { state.categories.splice(idx, 1); renderSettings(); } }

    init();
</script>
</body>
</html>
