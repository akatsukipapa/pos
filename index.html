<!DOCTYPE html>
<html class="dark" lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>美容室POS v1.30 Stable</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ecc813",
                        "secondary": "#f472b6",
                        "background-dark": "#0f0a15",
                        "neutral-dark": "#1e1629",
                    },
                    fontFamily: { "display": ["Manrope", "sans-serif"] }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        .gold-gradient { background: linear-gradient(135deg, #ecc813 0%, #b3970f 100%); }
        .pink-glow { box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .premium-border { border: 1px solid rgba(236, 200, 19, 0.3); }
        body { min-height: 100dvh; }
        .menu-item-active { @apply bg-secondary border-secondary text-background-dark pink-glow; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100">

<div id="app">
    <div id="main-screen">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">fluid</span>
                <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase" id="display-salon-name">Loading...</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="openHistoryWithAuth()" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-secondary text-xl">menu_book</span>
                </button>
                <button onclick="switchScreen('settings')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-primary text-xl">settings</span>
                </button>
            </div>
        </header>

        <main class="p-4 space-y-8 max-w-md mx-auto pb-80">
            <div id="menu-container" class="space-y-8"></div>
            
            <section class="space-y-4 pt-4 border-t border-white/10">
                <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2">手入力項目</h3>
                <div class="bg-neutral-dark p-6 rounded-2xl premium-border space-y-4 shadow-xl">
                    <input id="custom-name" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-primary text-white" placeholder="項目名" type="text"/>
                    <input id="custom-price" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 outline-none focus:ring-1 focus:ring-primary text-white" placeholder="金額" type="number"/>
                    <button onclick="addCustomItem()" class="w-full py-3 bg-secondary/10 text-secondary border border-secondary/30 rounded-lg font-bold flex items-center justify-center gap-2 active:scale-95 transition-all">追加</button>
                </div>
            </section>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 z-50 bg-neutral-dark/95 backdrop-blur-xl border-t border-primary/30 p-4 pb-8">
            <div class="max-w-md mx-auto space-y-4">
                <div id="selected-list-area" class="hidden animate-pop">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <span class="text-[10px] font-bold text-secondary uppercase tracking-widest">選択中</span>
                        <button onclick="resetSelection()" class="text-[10px] text-slate-400 border-b border-slate-600 hover:text-white transition-all">全てリセット</button>
                    </div>
                    <div id="selected-tags-container" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto p-1"></div>
                </div>

                <div class="flex items-end justify-between px-2 pt-2 border-t border-white/5">
                    <div class="flex flex-col">
                        <span id="item-count" class="text-secondary text-[10px] font-bold uppercase tracking-widest">0点</span>
                        <span class="text-slate-200 text-sm font-bold">合計金額</span>
                    </div>
                    <div class="text-right"><span id="total-display" class="text-4xl font-black text-white tracking-tighter">¥ 0</span></div>
                </div>
                <button onclick="sendSalesData()" class="w-full py-5 gold-gradient rounded-2xl text-background-dark font-black text-lg shadow-lg active:scale-[0.97] transition-all">売上を送信する</button>
            </div>
        </footer>
    </div>

    <div id="history-screen" class="hidden min-h-screen bg-background-dark pb-10">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-secondary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark border border-secondary/30"><span class="material-symbols-outlined text-secondary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold tracking-widest text-secondary uppercase">売上帳簿</h1>
        </header>
        <main class="p-4 max-w-md mx-auto space-y-6">
            <div id="history-summary" class="grid grid-cols-1 gap-3"></div>
            <div id="history-details" class="hidden space-y-3 pt-6 border-t border-white/10">
                <h3 id="details-title" class="text-sm font-bold text-primary px-2"></h3>
                <div id="details-list" class="grid gap-2"></div>
            </div>
        </main>
    </div>

    <div id="settings-screen" class="hidden min-h-screen bg-background-dark pb-10">
        <header class="sticky top-0 z-50 bg-background-dark/80 backdrop-blur-md border-b border-primary/20 px-6 py-4 flex items-center gap-3">
            <button onclick="switchScreen('main')" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-dark premium-border"><span class="material-symbols-outlined text-primary">arrow_back</span></button>
            <h1 class="text-xl font-extrabold tracking-widest text-primary uppercase">設定</h1>
        </header>
        <main class="p-4 space-y-6 max-w-md mx-auto">
            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-3">
                <label class="text-[10px] font-bold text-primary tracking-widest uppercase">サロン名</label>
                <input id="salon-name-input" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-3 text-white outline-none focus:ring-1 focus:ring-primary" placeholder="サロン名を入力" type="text"/>
            </div>

            <div class="bg-neutral-dark p-4 rounded-2xl border border-white/5 space-y-3">
                <div class="flex items-center justify-between">
                    <label class="text-[10px] font-bold text-primary tracking-widest uppercase">GAS URL</label>
                    <button onclick="clearGasUrl()" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded border border-red-800/50 active:scale-95">クリア</button>
                </div>
                <input id="gas-url-input" class="w-full bg-background-dark/50 border border-white/10 rounded-lg px-4 py-2 text-xs text-white outline-none" placeholder="https://script.google.com/..." type="text"/>
            </div>

            <button onclick="saveAllSettings()" class="w-full py-4 gold-gradient text-background-dark font-black rounded-xl shadow-lg active:scale-95 transition-all">設定をすべて保存して反映</button>

            <div class="pt-6 border-t border-white/10 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 px-2 uppercase tracking-widest">メニュー編集</h3>
                <div id="settings-menu-editor" class="space-y-6"></div>
                <button onclick="addNewCategory()" class="w-full py-4 border-2 border-dashed border-primary/30 rounded-xl text-primary font-bold active:scale-95 transition-all">+ カテゴリー追加</button>
            </div>
        </main>
    </div>
</div>

<script>
    let state = {
        salonName: "Luxe Salon POS", gasUrl: "", selectedItems: [],
        categories: [{ id: "cat1", title: "カット", subtitle: "CUT", items: [{ id: "i1", name: "ドライカット", price: 1800 }] }]
    };

    function init() {
        const saved = localStorage.getItem('salon_pos_final_data');
        if (saved) {
            const parsed = JSON.parse(saved);
            state = { ...state, ...parsed, selectedItems: [] };
        }
        renderAll();
    }

    function sync() {
        localStorage.setItem('salon_pos_final_data', JSON.stringify(state));
    }

    function switchScreen(screen) {
        ['main-screen', 'history-screen', 'settings-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(screen + '-screen').classList.remove('hidden');
        if (screen === 'main') renderMain();
        if (screen === 'settings') renderSettings();
    }

    // --- メイン画面の描画 ---
    function renderMain() {
        document.getElementById('display-salon-name').textContent = state.salonName;
        const container = document.getElementById('menu-container');
        container.innerHTML = state.categories.map(cat => `
            <section class="space-y-4 animate-pop">
                <div class="flex items-center gap-2 px-2">
                    <div class="h-4 w-1 bg-secondary rounded-full"></div>
                    <div>
                        <h2 class="text-lg font-bold leading-tight">${cat.title}</h2>
                        ${cat.subtitle ? `<p class="text-[10px] text-slate-500 uppercase tracking-tighter">${cat.subtitle}</p>` : ''}
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-3">
                    ${cat.items.map(item => `
                        <button onclick="toggleItem('${item.id}', '${item.name}', ${item.price})" 
                            class="flex items-center justify-between p-4 rounded-xl border w-full transition-all active:scale-95 
                            ${state.selectedItems.some(si => si.id === item.id) ? 'menu-item-active' : 'bg-neutral-dark premium-border'}">
                            <span class="font-bold">${item.name}</span>
                            <span class="font-bold ${state.selectedItems.some(si => si.id === item.id) ? 'text-background-dark' : 'text-secondary'}">¥${item.price.toLocaleString()}</span>
                        </button>
                    `).join('')}
                </div>
            </section>
        `).join('');
        updateSummary();
    }

    // --- 設定画面の描画 ---
    function renderSettings() {
        document.getElementById('salon-name-input').value = state.salonName;
        document.getElementById('gas-url-input').value = state.gasUrl;
        
        const editor = document.getElementById('settings-menu-editor');
        editor.innerHTML = state.categories.map((cat, cIdx) => `
            <div class="bg-neutral-dark p-5 rounded-2xl border border-white/5 space-y-4 shadow-lg relative">
                <button onclick="deleteCategory(${cIdx})" class="absolute top-4 right-4 text-red-500/50 hover:text-red-500 transition-all text-xs">消去</button>
                <div class="grid gap-2">
                    <label class="text-[9px] font-bold text-slate-500 uppercase">カテゴリー名</label>
                    <input oninput="state.categories[${cIdx}].title = this.value; sync();" class="bg-background-dark/50 border border-white/10 rounded-lg px-3 py-2 text-white font-bold" value="${cat.title}" />
                    <label class="text-[9px] font-bold text-slate-500 uppercase">サブタイトル（英語など）</label>
                    <input oninput="state.categories[${cIdx}].subtitle = this.value; sync();" class="bg-background-dark/50 border border-white/10 rounded-lg px-3 py-2 text-xs text-slate-400" value="${cat.subtitle || ''}" />
                </div>
                <div class="space-y-3 pt-2">
                    <label class="text-[9px] font-bold text-slate-500 uppercase">メニュー項目</label>
                    ${cat.items.map((item, iIdx) => `
                        <div class="flex gap-2">
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'name', this.value)" class="flex-1 bg-background-dark/80 border border-white/10 rounded-lg text-xs text-white px-3 py-2" value="${item.name}" />
                            <input oninput="updateItem(${cIdx}, ${iIdx}, 'price', this.value)" class="w-24 bg-background-dark/80 border border-white/10 rounded-lg text-xs text-white px-3 py-2" type="number" value="${item.price}" />
                        </div>
                    `).join('')}
                    <button onclick="addItem(${cIdx})" class="w-full py-2 bg-white/5 rounded-lg text-[10px] text-slate-400">+ 項目追加</button>
                </div>
            </div>
        `).join('');
    }

    // --- ロジック ---
    function toggleItem(id, name, price) {
        const idx = state.selectedItems.findIndex(i => i.id === id);
        if (idx > -1) state.selectedItems.splice(idx, 1);
        else state.selectedItems.push({ id, name, price });
        renderMain();
    }

    function updateSummary() {
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        document.getElementById('total-display').textContent = `¥ ${total.toLocaleString()}`;
        document.getElementById('item-count').textContent = `${state.selectedItems.length}点 選択中`;

        const area = document.getElementById('selected-list-area');
        const container = document.getElementById('selected-tags-container');
        
        if (state.selectedItems.length > 0) {
            area.classList.remove('hidden');
            container.innerHTML = state.selectedItems.map(item => `
                <div class="px-3 py-1 bg-secondary/20 border border-secondary/40 text-secondary text-[10px] font-bold rounded-full flex items-center gap-1">
                    ${item.name}
                </div>
            `).join('');
        } else {
            area.classList.add('hidden');
        }
    }

    function resetSelection() {
        state.selectedItems = [];
        renderMain();
    }

    function updateItem(cIdx, iIdx, key, val) {
        state.categories[cIdx].items[iIdx][key] = key === 'price' ? parseInt(val) || 0 : val;
        sync();
    }

    function addItem(cIdx) {
        state.categories[cIdx].items.push({ id: "i" + Date.now() + Math.random(), name: "新メニュー", price: 0 });
        renderSettings();
        sync();
    }

    function addNewCategory() {
        state.categories.push({ id: "c" + Date.now(), title: "新カテゴリー", subtitle: "", items: [] });
        renderSettings();
        sync();
    }

    function deleteCategory(idx) {
        if (confirm('このカテゴリーを完全に消去しますか？')) {
            state.categories.splice(idx, 1);
            renderSettings();
            sync();
        }
    }

    function saveAllSettings() {
        state.salonName = document.getElementById('salon-name-input').value;
        state.gasUrl = document.getElementById('gas-url-input').value;
        sync();
        alert("設定を保存しました。メイン画面に反映します。");
        switchScreen('main');
    }

    function clearGasUrl() {
        document.getElementById('gas-url-input').value = '';
        state.gasUrl = '';
        sync();
    }

    function addCustomItem() {
        const name = document.getElementById('custom-name').value;
        const price = parseInt(document.getElementById('custom-price').value);
        if (!name || isNaN(price)) return alert("項目名と金額を入力してください");
        state.selectedItems.push({ id: "custom-" + Date.now(), name, price });
        document.getElementById('custom-name').value = '';
        document.getElementById('custom-price').value = '';
        renderMain();
    }

    // --- 通信 ---
    async function sendSalesData() {
        if (!state.selectedItems.length || !state.gasUrl) return alert("項目未選択、またはGAS URLが未設定です");
        const total = state.selectedItems.reduce((s, i) => s + i.price, 0);
        const payload = {
            timestamp: new Date().toLocaleString('ja-JP'),
            items: state.selectedItems.map(i => i.name).join(', '),
            total: total
        };
        try {
            await fetch(state.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("売上を送信しました！");
            resetSelection();
        } catch (e) { alert("送信エラーが発生しました"); }
    }

    async function openHistoryWithAuth() {
        const pass = prompt("履歴閲覧パスワードを入力してください");
        if (!pass) return;
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass }) });
            const data = await res.json();
            if (data.error) return alert(data.error);
            renderHistory(data.summary, pass);
            switchScreen('history');
        } catch (e) { alert("通信エラーまたはURLが不正です"); }
    }

    function renderHistory(summary, pass) {
        const container = document.getElementById('history-summary');
        const months = Object.keys(summary).sort().reverse();
        let totalYear = 0;
        container.innerHTML = months.map(m => {
            totalYear += summary[m];
            return `<button onclick="fetchDetails('${m}', '${pass}')" class="flex justify-between p-5 bg-neutral-dark rounded-xl border border-white/5 active:scale-95 shadow-lg">
                <span class="font-bold text-slate-300">${m}</span>
                <span class="font-bold text-secondary text-lg">¥${summary[m].toLocaleString()}</span>
            </button>`;
        }).join('') + `<div class="p-5 bg-primary/10 border-2 border-primary/30 rounded-xl flex justify-between mt-4"><span class="font-black text-primary">年合計</span><span class="font-black text-primary text-2xl">¥${totalYear.toLocaleString()}</span></div>`;
    }

    async function fetchDetails(month, pass) {
        try {
            const res = await fetch(state.gasUrl, { method: 'POST', body: JSON.stringify({ action: 'fetch', password: pass, month: month }) });
            const data = await res.json();
            const list = document.getElementById('details-list');
            document.getElementById('details-title').textContent = month + " の売上明細";
            list.innerHTML = data.details.map(d => `<div class="flex justify-between p-3 bg-neutral-dark/50 border border-white/5 rounded-lg text-xs"><span class="text-slate-400">${d.date}</span><span class="font-bold text-white">¥${d.price.toLocaleString()}</span></div>`).join('');
            document.getElementById('history-details').classList.remove('hidden');
        } catch (e) { alert("詳細取得失敗"); }
    }

    init();
</script>
</body>
</html>
